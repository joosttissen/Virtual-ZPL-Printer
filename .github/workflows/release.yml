name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore "Src/Virtual Printer Solution/ZPL Printer Solution.sln"

    - name: Build
      run: dotnet build "Src/Virtual Printer Solution/ZPL Printer Solution.sln" --configuration Release --no-restore

    - name: Test
      run: dotnet test "Src/Virtual Printer Solution/ZPL Printer Solution.sln" --configuration Release --no-build --verbosity normal

    - name: Publish
      run: dotnet publish "Src/Virtual Printer Solution/VirtualPrinter/Virtual ZPL Printer.csproj" --configuration Release --self-contained true --runtime win-x64 --output ./publish

    - name: Create zip archive
      run: Compress-Archive -Path ./publish/* -DestinationPath ./VirtualZplPrinter-${{ github.ref_name }}.zip
      shell: pwsh

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: ./VirtualZplPrinter-${{ github.ref_name }}.zip
